<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />

    <!-- Base SEO (overridden per-page by react-helmet-async) -->
    <title>Marketing Advice NI | Digital Marketing Agency, Derry</title>
    <meta name="description" content="Marketing Advice NI: premium SEO, PPC, social media and web design for businesses across Ireland and Northern Ireland. Google and Meta certified agency based in Derry/Londonderry." />
    <link rel="canonical" href="https://www.marketingadviceni.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Marketing Advice NI | Digital Marketing Agency, Derry" />
    <meta property="og:description" content="Need more clients for your business? That's exactly what we do. Premium digital marketing for businesses across Ireland &amp; Northern Ireland." />
    <meta property="og:url" content="https://www.marketingadviceni.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Marketing Advice NI" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:image" content="https://www.marketingadviceni.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@marketingadviceni" />
    <meta name="twitter:title" content="Marketing Advice NI | Digital Marketing Agency, Derry" />
    <meta name="twitter:description" content="Need more clients? SEO, PPC, Social Media &amp; Web Design for businesses across Ireland &amp; NI." />
    <meta name="twitter:image" content="https://www.marketingadviceni.com/og-image.jpg" />

    <!-- Geo tags (helps local search) -->
    <meta name="geo.region" content="GB-NIR" />
    <meta name="geo.placename" content="Derry/Londonderry" />
    <meta name="geo.position" content="54.9966;-7.3077" />
    <meta name="ICBM" content="54.9966, -7.3077" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
